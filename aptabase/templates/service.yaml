apiVersion: v1
kind: Service
metadata:
  name: {{ include "aptabase.appFullname" . }}
  labels:
    {{- include "aptabase.labels" . | nindent 4 }}
    app.kubernetes.io/component: app
spec:
  type: {{ .Values.aptabase.service.type }}
  ports:
    - port: {{ .Values.aptabase.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "aptabase.componentSelectorLabels" (dict "component" "app" "Chart" .Chart "Release" .Release "Values" .Values) | nindent 4 }}
