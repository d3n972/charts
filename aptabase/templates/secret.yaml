{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aptabase.secretsName" . }}
  labels:
    {{- include "aptabase.labels" . | nindent 4 }}
type: Opaque
stringData:
  AUTH_SECRET: {{ .Values.secrets.authSecret | quote }}
  POSTGRES_USER: {{ .Values.postgres.auth.username | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgres.auth.password | quote }}
  CLICKHOUSE_USER: {{ .Values.clickhouse.auth.username | quote }}
  CLICKHOUSE_PASSWORD: {{ .Values.clickhouse.auth.password | quote }}
{{- end }}
