apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "aptabase.fullname" . }}-test-connection"
  labels:
    {{- include "aptabase.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args: ['{{ include "aptabase.appFullname" . }}:{{ .Values.aptabase.service.port }}']
  restartPolicy: Never
