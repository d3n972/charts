{{- if .Values.clickhouse.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "aptabase.clickhouseFullname" . }}
  labels:
    {{- include "aptabase.labels" . | nindent 4 }}
    app.kubernetes.io/component: events-db
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.clickhouse.service.httpPort }}
      targetPort: http
      protocol: TCP
    - name: native
      port: {{ .Values.clickhouse.service.nativePort }}
      targetPort: native
      protocol: TCP
  selector:
    {{- include "aptabase.componentSelectorLabels" (dict "component" "events-db" "Chart" .Chart "Release" .Release "Values" .Values) | nindent 4 }}
{{- end }}
